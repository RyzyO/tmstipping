<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mock Sports Australian racehorse prizemoney Higher or Lower game" />
  <title>The Mock Sports — Higher or Lower</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ["Georgia", "serif"],
            sans: ["Inter", "system-ui", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/higherorlower/styles.css" />
</head>

<body class="min-h-[100dvh] bg-[#030712] text-white flex flex-col">
  <div class="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_top,_rgba(212,175,55,0.18),_transparent_42%)]"></div>

  <header class="relative z-10 flex shrink-0 items-center justify-between gap-3 px-4 py-3 md:px-10 md:py-5">
    <div class="flex min-w-0 items-center gap-2.5 sm:gap-3">
      <img src="/higherorlower/logo.png" alt="The Mock Sports" class="h-9 w-9 shrink-0 object-contain sm:h-11 sm:w-11 md:h-14 md:w-14" />
      <div class="min-w-0">
        <p class="text-[9px] font-bold uppercase tracking-[0.24em] text-[#d4af37] sm:text-xs sm:tracking-[0.28em]">The Mock Sports</p>
        <h1 class="font-display truncate text-base font-bold leading-tight sm:text-2xl md:text-3xl">Racehorse Higher or Lower</h1>
      </div>
    </div>

    <div class="shrink-0 rounded-full border border-white/10 bg-white/5 px-3 py-1.5 text-xs backdrop-blur sm:px-4 sm:py-2 sm:text-sm">
      Streak: <span id="streak" class="font-bold text-[#d4af37]">0</span>
    </div>
  </header>

  <main class="relative z-10 flex min-h-0 flex-1 flex-col">
    <section id="gameScreen" class="mx-auto flex w-full min-h-0 flex-1 max-w-7xl flex-col px-3 pb-3 md:px-8 md:pb-6">
      <div class="mb-2 shrink-0 text-center md:mb-5">
        <p class="text-xs text-slate-300 sm:text-sm">Which horse earned more career prizemoney?</p>
      </div>

      <div class="game-grid grid min-h-0 flex-1 grid-rows-[1fr_auto_1fr] gap-1.5 lg:grid-cols-[1fr_auto_1fr] lg:grid-rows-1 lg:gap-4 lg:items-stretch">
        <article id="leftCard" class="horse-card">
          <div class="horse-overlay"></div>
          <div class="card-content relative z-10 flex h-full flex-col items-center justify-center p-3 text-center md:p-8">
            <p class="eyebrow mb-1 text-[9px] font-bold uppercase tracking-[0.2em] text-[#f2d675] md:mb-2 md:text-xs md:tracking-[0.25em]">Career prizemoney</p>
            <h2 id="leftName" class="horse-name font-display text-2xl font-bold leading-none drop-shadow sm:text-3xl md:text-6xl"></h2>
            <p id="leftMoney" class="horse-money mt-2 text-xl font-black text-white sm:text-2xl md:mt-5 md:text-5xl"></p>
            <p id="leftRecord" class="horse-record mt-1 text-[10px] text-white/70 sm:text-xs md:mt-3 md:text-sm"></p>
          </div>
        </article>

        <div class="relative z-20 flex h-8 items-center justify-center lg:h-auto lg:-mx-8">
          <div class="vs-badge flex h-9 w-9 items-center justify-center rounded-full border-2 border-[#050914] bg-[#d4af37] text-[10px] font-black text-[#050914] shadow-2xl md:h-16 md:w-16 md:border-4 md:text-base">
            VS
          </div>
        </div>

        <article id="rightCard" class="horse-card">
          <div class="horse-overlay"></div>
          <div class="card-content relative z-10 flex h-full flex-col items-center justify-center p-3 text-center md:p-8">
            <p class="eyebrow mb-1 text-[9px] font-bold uppercase tracking-[0.2em] text-[#f2d675] md:mb-2 md:text-xs md:tracking-[0.25em]">Career prizemoney</p>
            <h2 id="rightName" class="horse-name font-display text-2xl font-bold leading-none drop-shadow sm:text-3xl md:text-6xl"></h2>

            <div id="questionArea" class="mt-2 flex w-full max-w-xs flex-row gap-2 md:mt-7 md:flex-col md:gap-3">
              <button id="higherBtn" class="choice-button">
                Higher
                <span aria-hidden="true">↑</span>
              </button>
              <button id="lowerBtn" class="choice-button">
                Lower
                <span aria-hidden="true">↓</span>
              </button>
            </div>

            <div id="answerArea" class="mt-2 hidden md:mt-5">
              <p id="rightMoney" class="horse-money text-xl font-black sm:text-2xl md:text-5xl"></p>
              <p id="rightRecord" class="horse-record mt-1 text-[10px] text-white/70 sm:text-xs md:mt-3 md:text-sm"></p>
              <p id="resultText" class="mt-5 text-lg font-bold"></p>
            </div>
          </div>
        </article>
      </div>

      <p class="mt-1 shrink-0 text-center text-[9px] text-slate-500 md:mt-4 md:text-xs md:text-slate-400">
        A Mock Sports racing game · Prototype horse data
      </p>
    </section>

    <section id="gameOverScreen" class="hidden min-h-0 flex-1 items-center justify-center px-4 pb-6 md:pb-10">
      <div class="w-full max-w-lg rounded-3xl border border-white/10 bg-white/5 p-6 text-center shadow-2xl backdrop-blur-xl md:p-8">
        <p class="text-xs font-bold uppercase tracking-[0.3em] text-[#d4af37]">Game over</p>
        <h2 class="mt-2 font-display text-4xl font-bold md:mt-3 md:text-5xl">Final streak</h2>
        <p id="finalScore" class="my-4 text-6xl font-black text-[#d4af37] md:my-6 md:text-7xl">0</p>
        <p id="bestScore" class="mb-5 text-sm text-slate-300 md:mb-7"></p>
        <div class="grid gap-3 sm:grid-cols-2">
          <button id="shareBtn" class="w-full rounded-2xl border-2 border-[#d4af37] bg-transparent px-6 py-3.5 font-black text-[#f2d675] transition hover:bg-[#d4af37] hover:text-[#050914]">
            Share Result
          </button>
          <button id="restartBtn" class="w-full rounded-2xl bg-[#d4af37] px-6 py-3.5 font-black text-[#050914] transition hover:bg-[#f2d675]">
            Race Again
          </button>
        </div>
        <p id="shareStatus" class="mt-3 min-h-5 text-xs text-slate-400" aria-live="polite"></p>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="relative z-10 bg-gray-950 border-t border-gray-800 text-gray-400 py-10 shrink-0">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex flex-col items-center md:items-start">
          <div class="flex items-center mb-2">
            <img src="/images/logo.png" alt="Logo" class="h-6 w-auto mr-2" style="object-fit: contain;" />
            <span class="font-semibold text-gray-300">The Mock Sports</span>
          </div>
          <p class="text-sm text-gray-500">&copy; 2026 All rights reserved.</p>
          <a href="/terms.html" class="text-sm text-gray-500 hover:text-yellow-400 transition-colors duration-200 underline">Terms &amp; Conditions</a>
          <a href="/privacy.html" class="text-sm text-gray-500 hover:text-yellow-400 transition-colors duration-200 underline">Privacy Policy</a>
        </div>
        <div class="flex space-x-6">
          <a href="https://x.com/themocksports" target="_blank" rel="noopener noreferrer" class="hover:text-yellow-400 transition-colors duration-200" aria-label="Follow us on X">

          </a>

          </a>

            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2c-2.717 0-3.056.012-4.123.06-1.064.049-1.79.218-2.427.465a4.9 4.9 0 0 0-1.772 1.153A4.9 4.9 0 0 0 2.525 5.45c-.247.637-.416 1.363-.465 2.427C2.012 8.944 2 9.283 2 12s.012 3.056.06 4.123c.049 1.064.218 1.79.465 2.427a4.9 4.9 0 0 0 1.153 1.772 4.9 4.9 0 0 0 1.772 1.153c.637.247 1.363.416 2.427.465C8.944 21.988 9.283 22 12 22s3.056-.012 4.123-.06c1.064-.049 1.79-.218 2.427-.465a4.9 4.9 0 0 0 1.772-1.153 4.9 4.9 0 0 0 1.153-1.772c.247-.637.416-1.363.465-2.427.048-1.067.06-1.406.06-4.123s-.012-3.056-.06-4.123c-.049-1.064-.218-1.79-.465-2.427a4.9 4.9 0 0 0-1.153-1.772A4.9 4.9 0 0 0 18.55 2.525c-.637-.247-1.363-.416-2.427-.465C15.056 2.012 14.717 2 12 2zm0 1.802c2.67 0 2.987.01 4.042.059.976.045 1.505.207 1.858.344.467.182.8.399 1.15.748.35.35.566.683.748 1.15.137.353.3.882.344 1.858.048 1.055.058 1.372.058 4.042s-.01 2.987-.058 4.042c-.045.976-.207 1.505-.344 1.858a3.1 3.1 0 0 1-.748 1.15c-.35.35-.683.566-1.15.748-.353.137-.882.3-1.858.344-1.055.048-1.372.058-4.042.058s-2.987-.01-4.042-.058c-.976-.045-1.505-.207-1.858-.344a3.1 3.1 0 0 1-1.15-.748 3.1 3.1 0 0 1-.748-1.15c-.137-.353-.3-.882-.344-1.858-.048-1.055-.058-1.372-.058-4.042s.01-2.987.058-4.042c.045-.976.207-1.505.344-1.858.182-.467.399-.8.748-1.15.35-.35.683-.566 1.15-.748.353-.137.882-.3 1.858-.344 1.055-.048 1.372-.058 4.042-.058zm0 4.594a5.604 5.604 0 1 0 0 11.208 5.604 5.604 0 0 0 0-11.208zm0 9.242a3.638 3.638 0 1 1 0-7.276 3.638 3.638 0 0 1 0 7.276zm5.83-9.462a1.31 1.31 0 1 1-2.62 0 1.31 1.31 0 0 1 2.62 0z"/></svg>
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="/higherorlower/script.js"></script>
</body>
</html>
