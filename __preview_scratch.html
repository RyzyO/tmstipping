<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - The Great Spring Tip Off</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#fbbf24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <style>
    .gradient-text {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .glass-effect {
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }
    .card {
      background: linear-gradient(145deg, rgba(31, 41, 55, 0.9), rgba(17, 24, 39, 0.9));
      border: 1px solid rgba(75, 85, 99, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      border-color: rgba(251, 191, 36, 0.3);
    }
    .stat-card {
      background: linear-gradient(145deg, rgba(31, 41, 55, 0.95), rgba(17, 24, 39, 0.95));
      border: 1px solid rgba(75, 85, 99, 0.4);
    }
    .horse-table {
      width: 100%;
      border-collapse: collapse;
    }
    .horse-table th {
      background: rgba(31, 41, 55, 0.8);
      padding: 12px;
      text-align: left;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid rgba(75, 85, 99, 0.3);
    }
    .horse-table td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(75, 85, 99, 0.2);
    }
    .horse-table tr:hover {
      background: rgba(55, 65, 81, 0.4);
    }
    .horse-table input, .horse-table select {
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(75, 85, 99, 0.3);
      color: #e5e7eb;
      padding: 6px 8px;
      border-radius: 4px;
      width: 100%;
      font-size: 0.75rem;
    }
    .horse-table input:focus, .horse-table select:focus {
      outline: none;
      border-color: rgba(251, 191, 36, 0.5);
      box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.1);
    }
    .tab-btn {
      padding: 12px 20px;
      border: none;
      background: rgba(31, 41, 55, 0.6);
      color: #d1d5db;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }
    .tab-btn.active {
      background: rgba(31, 41, 55, 0.95);
      color: #fbbf24;
      border-bottom-color: #f59e0b;
    }
    .tab-btn:hover {
      color: #fbbf24;
    }
    /* Past-year archive groups */
    .race-sidebar .year-group {
      margin-top: 16px;
      margin-bottom: 8px;
    }
    .race-sidebar .year-header {
      padding: 8px 12px;
      background: rgba(75, 85, 99, 0.25);
      border: 1px solid rgba(75, 85, 99, 0.4);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.875rem;
      font-weight: 700;
      color: #d1d5db;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .race-sidebar .year-header:hover {
      background: rgba(75, 85, 99, 0.35);
      border-color: rgba(75, 85, 99, 0.6);
    }
    .race-sidebar .year-header.expanded {
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }
    .race-sidebar .year-content {
      display: none;
      padding: 2px 8px 6px;
      border: 1px solid rgba(75, 85, 99, 0.4);
      border-top: none;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
      background: rgba(17, 24, 39, 0.4);
    }
    .race-sidebar .year-content.show {
      display: block;
    }
    .race-sidebar .year-content .date-group {
      margin-top: 8px;
    }
    .race-sidebar .date-group {
      margin-top: 12px;
      margin-bottom: 8px;
    }
    .race-sidebar .date-header {
      padding: 8px 12px;
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.875rem;
      font-weight: 600;
      color: #fbbf24;
      list-style: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .race-sidebar .date-header:hover {
      background: rgba(251, 191, 36, 0.25);
      border-color: rgba(251, 191, 36, 0.5);
    }
    .race-sidebar .date-header.expanded {
      background: rgba(251, 191, 36, 0.2);
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }
    .race-sidebar .races-for-date {
      display: none;
      border: 1px solid rgba(251, 191, 36, 0.3);
      border-top: none;
      border-bottom-left-radius: 6px;
      border-bottom-right-radius: 6px;
      background: rgba(17, 24, 39, 0.5);
      padding: 4px;
      margin-bottom: 4px;
    }
    .race-sidebar .races-for-date.show {
      display: block;
    }
    .race-sidebar .race-item {
      padding: 10px 12px;
      margin: 2px 0;
      background: rgba(31, 41, 55, 0.5);
      border: 1px solid rgba(75, 85, 99, 0.2);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.875rem;
      list-style: none;
    }
    .race-sidebar .race-item:hover {
      background: rgba(31, 41, 55, 0.8);
      border-color: rgba(251, 191, 36, 0.3);
    }
    .race-sidebar .race-item.selected {
      background: rgba(251, 191, 36, 0.1);
      border-color: rgba(251, 191, 36, 0.5);
      color: #fbbf24;
      font-weight: 600;
    }
    .btn-primary {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      color: #1a1a1a;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }
    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 8px 12px rgba(251, 191, 36, 0.3);
    }
    .btn-secondary {
      background: rgba(31, 41, 55, 0.9);
      color: #d1d5db;
      padding: 10px 16px;
      border: 1px solid rgba(75, 85, 99, 0.3);
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }
    .btn-secondary:hover {
      border-color: rgba(251, 191, 36, 0.3);
      color: #fbbf24;
    }
    .btn-danger {
      background: rgba(220, 38, 38, 0.2);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 8px 12px;
      border-radius: 4px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.75rem;
    }
    .btn-danger:hover {
      background: rgba(220, 38, 38, 0.3);
      border-color: rgba(239, 68, 68, 0.5);
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: #d1d5db;
    }
    .form-group input,
    .form-group select,
    .form-group textarea,
    input.form-group,
    select.form-group,
    textarea.form-group {
      width: 100%;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(75, 85, 99, 0.3);
      color: #e5e7eb;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus,
    input.form-group:focus,
    select.form-group:focus,
    textarea.form-group:focus {
      outline: none;
      border-color: rgba(251, 191, 36, 0.5);
      box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.1);
    }
    select {
      background-color: #111827;
      color: #e5e7eb;
    }
    select option {
      background-color: #111827;
      color: #e5e7eb;
    }
    .notification {
      padding: 12px 16px;
      border-radius: 6px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.875rem;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .notification.success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }
    .notification.error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }
    /* ── Horse rows: aligned grid on desktop, labelled card on mobile ── */
    :root {
      --horse-cols: 52px minmax(130px, 2.2fr) minmax(104px, 1.4fr) minmax(104px, 1.4fr) 62px 72px 82px 40px;
    }
    .horses-header {
      display: grid;
      grid-template-columns: var(--horse-cols);
      gap: 10px;
      padding: 0 12px 8px;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9ca3af;
      font-weight: 600;
    }
    .horses-header span { min-width: 0; }
    .horse-row {
      background: rgba(31, 41, 55, 0.5);
      border: 1px solid rgba(75, 85, 99, 0.2);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: grid;
      grid-template-columns: var(--horse-cols);
      gap: 8px 10px;
      align-items: end;
    }
    .hr-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .hr-field > label {
      display: none; /* desktop uses the shared header row instead */
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #9ca3af;
      font-weight: 600;
    }
    .horse-row input {
      width: 100%;
      min-width: 0;
      background: rgba(17, 24, 39, 0.9);
      border: 1px solid rgba(75, 85, 99, 0.3);
      color: #e5e7eb;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.875rem;
      font-family: inherit;
    }
    .horse-row input:focus {
      outline: none;
      border-color: rgba(251, 191, 36, 0.5);
      box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.1);
    }
    .horse-row input::placeholder { color: #9ca3af; }
    .horse-row input[readonly] { opacity: 0.65; cursor: default; }
    .hr-remove {
      align-self: end;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 38px;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .hr-remove:hover { background: rgba(220, 38, 38, 0.3); border-color: rgba(239, 68, 68, 0.5); }
    .hr-remove svg { width: 16px; height: 16px; }
    .hr-remove-label { display: none; } /* desktop: icon only */
    /* Collapsible import options */
    .ra-disclosure > summary {
      cursor: pointer;
      list-style: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      color: #d1d5db;
      padding: 4px 0;
      user-select: none;
    }
    .ra-disclosure > summary::-webkit-details-marker { display: none; }
    .ra-disclosure > summary::before {
      content: "›";
      display: inline-block;
      font-size: 1.1rem;
      line-height: 1;
      transition: transform 0.2s;
      color: #fbbf24;
    }
    .ra-disclosure[open] > summary::before { transform: rotate(90deg); }
    .ra-disclosure > summary:hover { color: #fbbf24; }

    /* Card layout for phones and small tablets so the dense grid never spills */
    @media (max-width: 900px) {
      .horses-header { display: none; }
      .horse-row {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "no barrier"
          "name name"
          "trainer trainer"
          "jockey jockey"
          "weight silk"
          "remove remove";
        gap: 12px 10px;
        padding: 14px;
      }
      .hr-field > label { display: block; }
      .hr-no { grid-area: no; }
      .hr-barrier { grid-area: barrier; }
      .hr-name { grid-area: name; }
      .hr-trainer { grid-area: trainer; }
      .hr-jockey { grid-area: jockey; }
      .hr-weight { grid-area: weight; }
      .hr-silk { grid-area: silk; }
      .hr-remove { grid-area: remove; width: 100%; height: 42px; gap: 6px; font-size: 0.8rem; }
      .hr-remove-label { display: inline; }
    }
    @media (max-width: 767px) {
      .horse-row input { font-size: 16px; } /* prevents iOS zoom */
    }
    
    /* Mobile Responsive Styles */
    .sidebar-toggle {
      display: none; /* Hidden by default */
    }
    
    .mobile-sidebar {
      display: none; /* Always hidden by default */
    }
    
    @media (max-width: 768px) {
      .sidebar-toggle {
        display: flex; /* Show on mobile */
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 100;
        background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        color: #1a1a1a;
        border-radius: 50%;
        width: 56px;
        height: 56px;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 12px rgba(251, 191, 36, 0.4);
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }
      .sidebar-toggle:active {
        transform: scale(0.95);
      }
      .mobile-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 90;
        display: none;
      }
      .mobile-sidebar.show {
        display: block;
      }
      .mobile-sidebar-content {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        max-height: 70vh;
        background: linear-gradient(145deg, rgba(31, 41, 55, 0.98), rgba(17, 24, 39, 0.98));
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
        overflow-y: auto;
        animation: slideUp 0.3s ease;
      }
      @keyframes slideUp {
        from { transform: translateY(100%); }
        to { transform: translateY(0); }
      }
      .tab-btn {
        font-size: 0.75rem;
        padding: 10px 12px;
        gap: 4px;
      }
      .tab-btn svg {
        width: 14px;
        height: 14px;
      }
      .horse-table {
        font-size: 0.75rem;
      }
      .horse-table th,
      .horse-table td {
        padding: 8px 6px;
        white-space: nowrap;
      }
      .stat-card {
        padding: 1rem !important;
      }
      .stat-card p:first-child {
        font-size: 0.75rem;
      }
      .stat-card .text-3xl {
        font-size: 1.5rem;
      }
      .form-group input,
      .form-group select,
      .form-group textarea {
        font-size: 16px; /* Prevents zoom on iOS */
      }
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen p-8">
  <div class="card rounded-lg p-8 max-w-4xl">
    <div class="flex items-center justify-between mb-6 flex-wrap gap-3">
      <h2 class="text-xl md:text-2xl font-bold gradient-text flex items-center gap-2">
        <i data-feather="users" class="h-6 w-6"></i>
        User Admin
      </h2>
    </div>

    <div class="form-group m-0 mb-6">
      <label for="user-admin-comp">Competition</label>
      <select id="user-admin-comp">
        <option>The Great Spring Tip Off</option>
      </select>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <div class="lg:col-span-1">
        <div class="form-group m-0 relative">
          <label for="user-admin-search">Search Users</label>
          <i data-feather="search" class="h-4 w-4 absolute left-3 top-[42px] text-gray-500 pointer-events-none"></i>
          <input type="text" id="user-admin-search" class="!pl-9" placeholder="Search by name, email, or team name..." value="jo" autocomplete="off">
        </div>
        <div id="user-admin-result-count" class="text-xs text-gray-500 mt-2 mb-1">2 of 5 players</div>
        <div id="user-admin-results" class="space-y-1 max-h-[420px] overflow-y-auto pr-1 rounded-lg border border-gray-700/60 bg-gray-900/40">
          <button type="button" class="w-full text-left px-3 py-2.5 flex items-center justify-between gap-2 transition border-b border-gray-800/60 last:border-b-0 bg-yellow-500/15">
            <span class="min-w-0">
              <span class="block text-sm font-semibold text-gray-100 truncate">JokerMaster <span class="font-normal text-gray-400">(Jordan Lee)</span></span>
              <span class="block text-xs text-gray-500 truncate">jordan@example.com</span>
            </span>
            <span class="flex-shrink-0 text-[10px] px-1.5 py-0.5 rounded-full font-semibold bg-green-500/15 text-green-400">PAID</span>
          </button>
          <button type="button" class="w-full text-left px-3 py-2.5 flex items-center justify-between gap-2 transition border-b border-gray-800/60 last:border-b-0 hover:bg-gray-800/70">
            <span class="min-w-0">
              <span class="block text-sm font-semibold text-gray-100 truncate">JoTips <span class="font-normal text-gray-400">(Joanne Smith)</span></span>
              <span class="block text-xs text-gray-500 truncate">joanne@example.com</span>
            </span>
            <span class="flex-shrink-0 text-[10px] px-1.5 py-0.5 rounded-full font-semibold bg-gray-600/20 text-gray-400">PENDING</span>
          </button>
        </div>
      </div>

      <div class="lg:col-span-2">
        <div id="user-admin-summary" class="text-sm text-gray-400">Editing JokerMaster</div>
      </div>
    </div>
  </div>
  <script>feather.replace();</script>
</body>
</html>
