<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Mock Sports Tipping</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #FFD700;
      --gold-dark: #bfa100;
      --black: #181818;
      --glass-bg: rgba(24,24,24,0.85);
      --input-bg: rgba(255,255,255,0.08);
      --input-border: #FFD700;
      --error: #ff4d4f;
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0; padding: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #181818 0%, #232526 100%);
      color: #fff;
    }
    body { display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .container {
      background: var(--glass-bg);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.37), 0 0 0 2px var(--gold);
      backdrop-filter: blur(8px);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }
    h2 { text-align: center; color: var(--gold); font-family: 'Outfit', sans-serif; font-size: 2rem; margin-bottom: 1rem; }
    .gold-line { width: 60px; height: 4px; background: linear-gradient(90deg, var(--gold), #fffbe6); border-radius: 2px; margin: 0 auto 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.3rem; color: var(--gold); font-weight: 600; }
    input {
      width: 100%; padding: 0.75rem;
      background: var(--input-bg); border: 2px solid var(--input-border);
      border-radius: 8px; color: #fff; font-size: 1rem;
    }
    input:focus { outline: none; border-color: var(--gold-dark); box-shadow: 0 0 0 2px var(--gold); }
    button {
      width: 100%; padding: 0.75rem;
      background: linear-gradient(90deg, var(--gold), #fffbe6);
      color: #181818; border: none; border-radius: 8px;
      font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem;
    }
    button:hover { background: linear-gradient(90deg, #fffbe6, var(--gold)); }
    #message { text-align: center; margin-top: 10px; min-height: 24px; font-size: 0.95rem; }
    .loading { color: #ccc; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Set New Password</h2>
    <div class="gold-line"></div>
    <div id="loading" class="loading" style="text-align:center; padding: 1rem;">Verifying reset link...</div>
    <form id="reset-form" style="display:none;">
      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" minlength="6" required placeholder="At least 6 characters">
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" minlength="6" required>
      </div>
      <button type="submit">Update Password</button>
      <div id="message"></div>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './supabase-config.js';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const loadingEl = document.getElementById('loading');
    const formEl = document.getElementById('reset-form');
    const messageEl = document.getElementById('message');

    // Supabase puts the recovery token in the URL hash — listen for the session
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        loadingEl.style.display = 'none';
        formEl.style.display = '';
      } else if (event === 'SIGNED_IN' && session) {
        // Already signed in via recovery link
        loadingEl.style.display = 'none';
        formEl.style.display = '';
      } else if (!session) {
        loadingEl.textContent = 'Invalid or expired reset link. Please request a new one.';
      }
    });

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      const newPass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;

      if (newPass !== confirmPass) {
        messageEl.style.color = '#ff4d4f';
        messageEl.textContent = 'Passwords do not match.';
        return;
      }

      const { error } = await supabase.auth.updateUser({ password: newPass });
      if (error) {
        messageEl.style.color = '#ff4d4f';
        messageEl.textContent = error.message;
      } else {
        messageEl.style.color = '#FFD700';
        messageEl.textContent = '✓ Password updated! Redirecting to login...';
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      }
    });
  </script>
</body>
</html>
