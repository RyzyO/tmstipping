<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - The Great Spring Tip Off</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#fbbf24">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>

  <style>
    html, body {
      min-height: 100%;
      overflow-x: hidden;
    }
    body {
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch;
    }
    @supports (height: 100dvh) {
      body {
        min-height: 100dvh;
      }
    }
    .gradient-text {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card {
      background: linear-gradient(145deg, rgba(31, 41, 55, 0.9), rgba(17, 24, 39, 0.9));
      border: 1px solid rgba(75, 85, 99, 0.3);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-field {
      background: linear-gradient(145deg, rgba(31, 41, 55, 0.9), rgba(17, 24, 39, 0.9));
      border: 1px solid rgba(75, 85, 99, 0.4);
      transition: all 0.2s ease;
    }
    .input-field:focus {
      border-color: rgba(251, 191, 36, 0.5);
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
      outline: none;
    }
    .floating-shapes {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }
    .shape {
      position: absolute;
      opacity: 0.03;
      animation: float 20s infinite ease-in-out;
    }
    .shape-1 { top: 10%; left: 10%; width: 300px; height: 300px; animation-delay: 0s; }
    .shape-2 { top: 60%; right: 15%; width: 250px; height: 250px; animation-delay: 5s; }
    .shape-3 { bottom: 10%; left: 30%; width: 200px; height: 200px; animation-delay: 10s; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(180deg); }
    }
    .logo-glow {
      filter: drop-shadow(0 0 20px rgba(251, 191, 36, 0.3));
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-start sm:items-center justify-center px-4 py-8 relative overflow-x-hidden overflow-y-auto">
  <!-- Floating Background Shapes -->
  <div class="floating-shapes">
    <div class="shape shape-1 bg-gradient-to-br from-yellow-500 to-amber-600 rounded-full blur-3xl"></div>
    <div class="shape shape-2 bg-gradient-to-br from-amber-500 to-orange-600 rounded-full blur-3xl"></div>
    <div class="shape shape-3 bg-gradient-to-br from-yellow-600 to-amber-700 rounded-full blur-3xl"></div>
  </div>

  <!-- Main Container -->
  <div class="relative z-10 w-full max-w-md" data-aos="fade-up">
    <!-- Logo & Brand -->
    <div class="text-center mb-8">
      <div class="inline-block logo-glow mb-4">
        <img src="images/logo.png" alt="Logo" class="h-16 w-16 mx-auto" style="object-fit: contain;">
      </div>
      <h1 class="text-3xl font-bold gradient-text mb-2">The Great Spring Tip Off</h1>
      <p class="text-gray-400 text-sm">by The Mock Sports</p>
    </div>

    <!-- Reset Password Card -->
    <div class="card rounded-2xl shadow-2xl p-8 relative overflow-hidden">
      <!-- Subtle gradient overlay -->
      <div class="absolute top-0 right-0 w-64 h-64 bg-gradient-to-br from-yellow-600/5 to-transparent rounded-full blur-3xl"></div>
      <div class="absolute bottom-0 left-0 w-48 h-48 bg-gradient-to-tr from-amber-600/5 to-transparent rounded-full blur-3xl"></div>

      <div class="relative z-10">
        <div class="mb-6">
          <h2 class="text-2xl font-bold text-gray-100 mb-2">Set New Password</h2>
          <p class="text-gray-400 text-sm" id="subtitle">Verifying reset link...</p>
        </div>

        <!-- Loading State -->
        <div id="loading" class="flex items-center justify-center gap-2 text-gray-400 text-sm py-6">
          <i data-feather="loader" class="h-4 w-4 animate-spin"></i>
          Verifying reset link...
        </div>

        <!-- Reset Form -->
        <form id="reset-form" class="space-y-5 hidden">
          <!-- New Password -->
          <div>
            <label for="new-password" class="block text-sm font-semibold text-gray-300 mb-2 flex items-center gap-2">
              <i data-feather="lock" class="h-4 w-4 text-yellow-400"></i>
              New Password
            </label>
            <input
              type="password"
              id="new-password"
              minlength="6"
              required
              class="input-field w-full px-4 py-3 rounded-lg text-gray-100 placeholder-gray-500"
              placeholder="At least 6 characters"
            >
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirm-password" class="block text-sm font-semibold text-gray-300 mb-2 flex items-center gap-2">
              <i data-feather="lock" class="h-4 w-4 text-yellow-400"></i>
              Confirm Password
            </label>
            <input
              type="password"
              id="confirm-password"
              minlength="6"
              required
              class="input-field w-full px-4 py-3 rounded-lg text-gray-100 placeholder-gray-500"
              placeholder="••••••••"
            >
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="w-full py-3 rounded-lg bg-gradient-to-r from-yellow-500 to-amber-500 text-gray-900 font-bold hover:from-yellow-400 hover:to-amber-400 transition-all duration-200 shadow-lg shadow-yellow-900/30 flex items-center justify-center gap-2"
          >
            <i data-feather="check-circle" class="h-5 w-5"></i>
            Update Password
          </button>

          <!-- Message -->
          <div id="message" class="text-center text-sm min-h-[24px]"></div>
        </form>
      </div>
    </div>

    <!-- Footer Links -->
    <div class="mt-8 text-center space-y-3">
      <div class="flex justify-center gap-6 text-sm">
        <a href="faq.html" class="text-gray-400 hover:text-yellow-400 transition flex items-center gap-1">
          <i data-feather="help-circle" class="h-4 w-4"></i>
          Help
        </a>
        <a href="prizesdark.html" class="text-gray-400 hover:text-yellow-400 transition flex items-center gap-1">
          <i data-feather="award" class="h-4 w-4"></i>
          Prizes
        </a>
      </div>
      <p class="text-gray-500 text-xs">&copy; 2026 The Mock Sports. All rights reserved.</p>
      <p class="text-gray-600 text-xs pt-2 border-t border-gray-800">
        <a href="login.html" class="text-gray-500 hover:text-yellow-400 transition font-medium">Back to Login</a>
      </p>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './supabase-config.js';

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const loadingEl = document.getElementById('loading');
    const subtitleEl = document.getElementById('subtitle');
    const formEl = document.getElementById('reset-form');
    const messageEl = document.getElementById('message');

    function showForm() {
      loadingEl.classList.add('hidden');
      subtitleEl.textContent = 'Choose a new password for your account';
      formEl.classList.remove('hidden');
      feather.replace();
    }

    // Supabase puts the recovery token in the URL hash — listen for the session
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        showForm();
      } else if (event === 'SIGNED_IN' && session) {
        // Already signed in via recovery link
        showForm();
      } else if (!session) {
        loadingEl.innerHTML = '<i data-feather="alert-circle" class="h-4 w-4 text-red-400"></i> Invalid or expired reset link. Please request a new one.';
        loadingEl.classList.add('text-red-400');
        subtitleEl.textContent = 'This link is no longer valid';
        feather.replace();
      }
    });

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageEl.textContent = '';
      messageEl.className = 'text-center text-sm min-h-[24px]';

      const newPass = document.getElementById('new-password').value;
      const confirmPass = document.getElementById('confirm-password').value;

      if (newPass !== confirmPass) {
        messageEl.className = 'text-center text-sm min-h-[24px] text-red-400 font-medium';
        messageEl.textContent = 'Passwords do not match.';
        return;
      }

      const { error } = await supabase.auth.updateUser({ password: newPass });
      if (error) {
        messageEl.className = 'text-center text-sm min-h-[24px] text-red-400 font-medium';
        messageEl.textContent = error.message;
      } else {
        messageEl.className = 'text-center text-sm min-h-[24px] text-green-400 font-medium';
        messageEl.textContent = '✓ Password updated! Redirecting to login...';
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      }
    });

    // Initialize AOS and Feather
    AOS.init({ duration: 800, once: true });
    feather.replace();
  </script>
</body>
</html>
