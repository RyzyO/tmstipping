<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Notifications - The Great Spring Tip Off</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
  <style>
    .gradient-text {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .glass-effect {
      background: rgba(17, 24, 39, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    .card {
      background: linear-gradient(145deg, rgba(31, 41, 55, 0.9), rgba(17, 24, 39, 0.9));
      border: 1px solid rgba(75, 85, 99, 0.3);
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col">
  <nav class="sticky top-0 z-50 glass-effect">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center py-4">
        <div class="flex items-center gap-4 flex-1">
          <a href="dark.html" class="md:hidden flex items-center gap-2 text-gray-300 hover:text-yellow-400 transition">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            <span>Back</span>
          </a>
          <div class="flex items-center">
            <img src="images/logo.png" alt="Logo" class="h-8 w-8 mr-2" style="object-fit: contain;" />
            <h1 class="text-xl font-bold gradient-text hidden sm:block">The Great Spring Tip Off</h1>
          </div>
        </div>
        <div class="hidden md:flex space-x-6">
          <a href="dark.html" class="text-gray-300 hover:text-yellow-400 transition">Home</a>
          <a href="tipdark.html" class="text-gray-300 hover:text-yellow-400 transition">Tip Now</a>
          <a href="notificationsdark.html" class="text-yellow-400">Notifications</a>
          <a href="profiledark.html" class="text-gray-300 hover:text-yellow-400 transition">Profile</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 flex-1">
    <section class="card rounded-2xl p-6 mb-6">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div>
          <h2 class="text-2xl md:text-3xl font-bold gradient-text">Notifications</h2>
          <p class="text-gray-300 mt-2">Latest race reminders and admin updates.</p>
        </div>
        <div class="flex flex-col sm:flex-row gap-2">
          <button id="enable-notifs-btn" class="px-4 py-2 rounded-lg bg-gradient-to-r from-yellow-500 to-amber-500 text-gray-900 font-semibold hover:from-yellow-400 hover:to-amber-400 transition">
            Enable Push Notifications
          </button>
          <button id="send-test-notif-btn" class="px-4 py-2 rounded-lg bg-gray-800 border border-gray-600 text-gray-100 font-semibold hover:border-yellow-400 hover:text-yellow-300 transition">
            Send Me A Test
          </button>
        </div>
      </div>
      <p id="notif-status" class="text-sm text-gray-400 mt-3"></p>
    </section>

    <section class="card rounded-2xl p-6">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-lg font-semibold">Notification History</h3>
        <span id="notif-count" class="text-sm text-gray-400">0</span>
      </div>
      <div id="notifications-list" class="space-y-3">
        <div class="text-sm text-gray-400">Loading notifications...</div>
      </div>
    </section>
  </main>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from './supabase-config.js';
    const { DateTime } = luxon;
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let compIds = [];
    let realtimeChannel = null;

    const statusEl = document.getElementById("notif-status");
    const countEl = document.getElementById("notif-count");
    const listEl = document.getElementById("notifications-list");
    const enableBtn = document.getElementById("enable-notifs-btn");
    const sendTestBtn = document.getElementById("send-test-notif-btn");

    async function loadUserCompIds(userId) {
      const { data } = await supabase
        .from('user_comp_joinings').select('comp_id')
        .eq('user_id', userId).eq('payment_status', 'completed');
      return [...new Set((data||[]).map(d=>d.comp_id).filter(Boolean))];
    }

    function renderNotifications(items) {
      countEl.textContent = `${items.length}`;

      if (!items.length) {
        listEl.innerHTML = '<div class="text-sm text-gray-400">No notifications yet.</div>';
        return;
      }

      listEl.innerHTML = "";
      for (const row of items) {
        // Support both new column format and legacy JSONB blob
        const n = row.data || row;
        let when = "Pending...";
        if (n.createdAt?._seconds) {
          when = DateTime.fromMillis(n.createdAt._seconds * 1000).setZone("Australia/Sydney").toFormat("EEE d LLL, h:mm a");
        } else if (n.createdAt) {
          when = DateTime.fromISO(n.createdAt).setZone("Australia/Sydney").toFormat("EEE d LLL, h:mm a");
        }

        const audience = n.audienceType === "competition" ? "Competition update" : "Global update";

        const row = document.createElement("div");
        row.className = "bg-gray-800 rounded-lg border border-gray-700 p-4";
        row.innerHTML = `
          <div class="flex items-start justify-between gap-3">
            <div>
              <div class="font-semibold text-gray-100">${n.title || "Notification"}</div>
              <div class="text-sm text-gray-300 mt-1">${n.body || ""}</div>
              <div class="text-xs text-gray-500 mt-2">${audience}</div>
            </div>
            <div class="text-xs text-gray-500 whitespace-nowrap">${when}</div>
          </div>
        `;
        listEl.appendChild(row);
      }
      feather.replace();
    }

    let currentUser = null;

    async function fetchAndRenderNotifications() {
      const { data: rows } = await supabase
        .from('notifications').select('*').order('id', { ascending: false }).limit(120);

      const filtered = (rows||[]).filter(row => {
        const n = row.data || row;
        const audience = n.audienceType || n.audience_type || "all";
        if (audience === "all") return true;
        if (audience === "user") {
          const uid = currentUser?.id;
          const email = currentUser?.email;
          return (uid && (n.userId === uid || n.notif_user_id === uid)) ||
                 (email && n.userEmail && n.userEmail.toLowerCase() === email.toLowerCase());
        }
        const compId = n.compId || n.notif_comp_id;
        return !!compId && compIds.includes(compId);
      });
      renderNotifications(filtered);
    }

    function watchNotificationHistory() {
      if (realtimeChannel) supabase.removeChannel(realtimeChannel);
      realtimeChannel = supabase.channel('notifications-watch')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'notifications' }, () => {
          fetchAndRenderNotifications();
        })
        .subscribe();
      fetchAndRenderNotifications();
    }

    enableBtn.addEventListener("click", () => {
      statusEl.textContent = "Push notifications require additional setup (FCM not yet migrated).";
    });

    sendTestBtn.addEventListener("click", async () => {
      if (!currentUser) return;
      try {
        const { error } = await supabase.from('notifications').insert({
          id: crypto.randomUUID(),
          data: {
            title: "Test notification",
            body: "This test notification is visible only to your account.",
            category: "test",
            audienceType: "user",
            userId: currentUser.id,
            userEmail: currentUser.email || null,
            createdAt: new Date().toISOString(),
          }
        });
        if (error) throw error;
        statusEl.textContent = "Test notification sent to your account.";
      } catch (error) {
        console.error("Failed to send test notification:", error);
        statusEl.textContent = "Failed to send test notification.";
      }
    });

    supabase.auth.onAuthStateChange((event, session) => {
      const user = session?.user || null;
      if (!user) { window.location.href = "login.html"; return; }
      currentUser = user;
      setTimeout(async () => {
        compIds = await loadUserCompIds(user.id);
        statusEl.textContent = "Notifications page loaded.";
        watchNotificationHistory();
      }, 0);
    });

    feather.replace();
  </script>
</body>
</html>
